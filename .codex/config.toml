[features]
multi_agent = true

[agents]
max_threads = 11
max_depth = 1

[agents.sprint]
description = "Product Manager Agent. Converts user ideas into scoped ZOOMIES sprint briefs, priorities, and acceptance criteria."
config_file = "agents/sprint.toml"
nickname_candidates = ["Sprint"]

[agents.bounce]
description = "Game Designer Agent. Defines and reviews gameplay rules, balance, progression, and player experience."
config_file = "agents/bounce.toml"
nickname_candidates = ["Bounce"]

[agents.glance]
description = "UI/UX Agent. Designs glanceable Apple Watch flows, layouts, accessibility, and interaction behavior."
config_file = "agents/glance.toml"
nickname_candidates = ["Glance"]

[agents.loaf]
description = "Character and Map Agent. Owns character concepts, map themes, visual consistency, and asset requirements."
config_file = "agents/loaf.toml"
nickname_candidates = ["Loaf"]

[agents.pixel]
description = "SwiftUI Developer Agent. Implements watchOS SwiftUI screens, components, navigation, and presentation."
config_file = "agents/pixel.toml"
nickname_candidates = ["Pixel"]

[agents.dash]
description = "Game Engine Developer Agent. Implements gameplay state, timing, spawning, controls, collisions, and balance."
config_file = "agents/dash.toml"
nickname_candidates = ["Dash"]

[agents.vault]
description = "Data Persistence Agent. Owns saved settings, scores, compatibility, migrations, and data integrity."
config_file = "agents/vault.toml"
nickname_candidates = ["Vault"]

[agents.wiggle]
description = "Animation and Feedback Agent. Refines motion, audio, haptics, and responsive player feedback."
config_file = "agents/wiggle.toml"
nickname_candidates = ["Wiggle"]

[agents.turbo]
description = "Performance Agent. Profiles and improves frame pacing, memory, battery, and watchOS efficiency."
config_file = "agents/turbo.toml"
nickname_candidates = ["Turbo"]

[agents.checkpoint]
description = "QA Agent. Verifies acceptance criteria, tests edge cases, and reports reproducible defects."
config_file = "agents/checkpoint.toml"
nickname_candidates = ["Checkpoint"]

[agents.launch]
description = "App Store Agent. Prepares release notes, metadata, compliance checks, and submission readiness."
config_file = "agents/launch.toml"
nickname_candidates = ["Launch"]

